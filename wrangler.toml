name = "admira-live-worker"
main = "src/index.js"
compatibility_date = "2025-07-18"
compatibility_flags = ["nodejs_compat"]

# Secrets (set con `wrangler secret put`):
#   YARIG_EMAIL
#   YARIG_PASSWORD

# Logs en tiempo real con `npm run tail`.
[observability]
enabled = true

# Capa de sync: snapshot de Yarig en KV, refrescado por Cron cada 5 min.
[[kv_namespaces]]
binding = "YARIG_CACHE"
id = "d1201968f692425bb4e94474bb73aba8"

[triggers]
crons = ["*/5 * * * *"]

# Si se monta el dominio api.admira.live en Cloudflare, descomentar:
# [[routes]]
# pattern = "api.admira.live/*"
# zone_name = "admira.live"
